services:
  hermesmq1:
    build: .
    environment:
      - HERMESMQ_NODE_ID=1
      - HERMESMQ_METRICS_ENABLED=true
    ports:
      - "7600:7600"
      - "9600:9600"
    volumes:
      - hermesmq1-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9600/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  hermesmq2:
    build: .
    environment:
      - HERMESMQ_NODE_ID=2
      - HERMESMQ_METRICS_ENABLED=true
    ports:
      - "7601:7600"
      - "9601:9600"
    volumes:
      - hermesmq2-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9600/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  hermesmq3:
    build: .
    environment:
      - HERMESMQ_NODE_ID=3
      - HERMESMQ_METRICS_ENABLED=true
    ports:
      - "7602:7600"
      - "9602:9600"
    volumes:
      - hermesmq3-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9600/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  hermesmq1-data:
  hermesmq2-data:
  hermesmq3-data:
